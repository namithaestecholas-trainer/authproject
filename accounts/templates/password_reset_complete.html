{% extends 'base.html' %}

{% block title %}Password Reset Complete | SecureAuth{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center flex-grow-1">
    <div class="col-md-7 col-lg-6 col-xl-5">
        <div class="card shadow-sm border-0 p-4 p-sm-5 text-center">
            <h3 class="fw-bold mb-3">Password Changed</h3>
            
            <p class="text-muted mb-4 px-md-3">
                Your password has been updated successfully. You can now use your new password to log in.
            </p>
            
            <a href="{% url 'login' %}" class="btn btn-custom w-100 py-2">
                Login Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
